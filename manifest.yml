---
applications:
- name: product-catalog-old-3d6c305f-modernized
  memory: 1G
  instances: 1
  buildpacks:
    - java_buildpack
  path: target/*.jar
  env:
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    SPRING_PROFILES_ACTIVE: cloud
  services:
    - modernized-postgres
    - modernized-rabbitmq
    - modernized-valkey

